name: Build RunPod Workers

on:
  push:
    branches:
      - main
      - ralph/runpod-deployment
    paths:
      - 'runpod/demucs/**'
      - 'runpod/musetalk/**'
      - '.github/workflows/build-runpod-workers.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/yt-translate

jobs:
  build-demucs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push demucs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/demucs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/demucs:latest
            ${{ env.IMAGE_PREFIX }}/demucs:${{ github.sha }}

  build-musetalk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary tools and libraries
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push musetalk image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/musetalk/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/musetalk:latest
            ${{ env.IMAGE_PREFIX }}/musetalk:${{ github.sha }}
